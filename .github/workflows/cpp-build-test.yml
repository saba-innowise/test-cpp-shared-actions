name: C++ Build and Test

on:
  workflow_call:
    inputs:
      source_directory:
        description: Source Directory
        default: tether_sum
        required: true
        type: string
      use_lockfile:
        description: Use Existing Lockfile
        default: false
        required: false
        type: boolean
    # secrets:
    #   github-token:
    #     description: "GitHub token for package registry access"
    #     required: false

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            profile: linux-gcc
            shell: bash
          - os: windows-latest
            profile: windows-msvc
            shell: pwsh
          - os: macos-latest
            profile: macos-clang
            shell: bash

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
        working-directory: ${{ inputs.source_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # - name: Setup GitHub Package Registry (if token provided)
      #   run: |
      #     if [ -n "$CONAN_PASSWORD" ]; then
      #       conan remote add github "https://conan.pkg.github.com/${{ github.repository_owner }}" --force || true
      #     else
      #       echo "No GitHub token provided, skipping GitHub Package Registry setup"
      #     fi
      #   env:
      #     CONAN_LOGIN_USERNAME: ${{ github.actor }}
      #     CONAN_PASSWORD: ${{ secrets.github-token }}

      - name: Setup Conan
        uses: conan-io/setup-conan@v1

      - name: Unix Build
        if: ${{ inputs.use-lockfile && runner.os != 'Windows' }}
        run: |
          conan profile detect --force

          conan build . \
            -o build_tests=True \
            -o run_tests=True \
            --build=missing \
            ${{ inputs.use_lockfile && '--lockfile=conan.lock' || '# do not use a lockfile' }}

      - name: Windows Build
        if: ${{ inputs.use-lockfile && runner.os == 'Windows' }}
        run: |
          conan profile detect --force

          conan build . `
            -o build_tests=True `
            -o run_tests=True `
            --build=missing `
            ${{ inputs.use_lockfile && '--lockfile=conan.lock' || '# do not use a lockfile' }}

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            ${{ inputs.source_directory }}/build/**/Testing/
            ${{ inputs.source_directory }}/build/**/*test*.xml
          if-no-files-found: ignore
